site_name: rmfakecloud-lite
site_url: https://lspaya05.github.io/rmfakecloud-lite
site_description: Self hosted headless reMarkable sync cloud
site_author: lspaya05

repo_url: https://github.com/lspaya05/rmfakecloud-lite
edit_uri: ""

theme:
  name: material
  locale: en
  features:
    - toc.integrate

markdown_extensions:
  - admonition

nav:
  - Home: index.md
  - Cloud Setup:
      - From Source: install/source.md
      - With Docker: install/docker.md
      - With Helm: install/helm.md
      - Configuration: install/configuration.md
      - Reverse Proxy:
          - Apache: install/reverse-proxy/apache.md
          - Nginx: install/reverse-proxy/nginx.md
          - Traefik: install/reverse-proxy/traefik.md
      - Fail2ban: install/fail2ban.md
      - External access: install/external-access.md
  - Device Setup:
      - Device: remarkable/setup.md
      - HTTPS: remarkable/https.md
  - Desktop Setup: remarkable/desktop-client.md
  - Usage:
      - User Profile: usage/userprofile.md
      - Admin API: usage/admin-api.md
      - Calendar (ICS): usage/calendar.md
      - Diff Sync: usage/diff-sync.md
      - Passcode Reset: usage/passcode-reset.md
      - Storage Layout: usage/storage-layout.md
