apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rmfakecloud.fullname" . }}
  labels:
    {{- include "rmfakecloud.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rmfakecloud.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "rmfakecloud.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env: 
            - name: JWT_SECRET_KEY
              value: "{{ .Values.rmfakecloud.jwt_secret_key }}"
            - name: RM_ADMIN_API_TOKEN
              value: "{{ .Values.rmfakecloud.rm_admin_api_token }}"
            - name: RM_TRUST_PROXY
              value: "{{ .Values.rmfakecloud.rm_trust_proxy }}"
            - name: STORAGE_URL
              value: "{{ .Values.rmfakecloud.storage_url }}"
            - name: RM_HTTPS_COOKIE
              value: "{{ .Values.rmfakecloud.rm_https_cookie }}"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /data/
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "rmfakecloud.fullname" . }}
            {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
